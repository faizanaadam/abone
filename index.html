<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abone Surgicals — Bangalore Ortho Directory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f5f7;color:#1a1a2e;min-height:100vh}
a{color:#1a56db;text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;height:56px}
.logo{font-size:15px;font-weight:700;color:#1a1a2e;white-space:nowrap}
.logo span{color:#e53e3e}
.header-stats{font-size:12px;color:#6b7280;border-left:1px solid #e5e7eb;padding-left:16px;white-space:nowrap}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:20px 24px}
.page{display:none}
.page.active{display:block}

/* Search + filters */
.search-bar{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:16px;margin-bottom:16px}
.search-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.search-input{flex:1;min-width:220px;padding:9px 14px;border:1px solid #d1d5db;border-radius:7px;font-size:14px;outline:none}
.search-input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
select.filter{padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;background:#fff;outline:none;cursor:pointer}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 12px;border-radius:999px;border:1px solid #d1d5db;font-size:12px;cursor:pointer;background:#fff;color:#374151;white-space:nowrap}
.chip:hover,.chip.on{background:#1a56db;color:#fff;border-color:#1a56db}
.results-meta{font-size:12px;color:#9ca3af;margin-bottom:12px;padding:0 2px}

/* Doctor cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);border-color:#d1d5db}
.card-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0}
.av-spine{background:#fef3c7;color:#92400e}
.av-trauma{background:#fee2e2;color:#991b1b}
.av-sptra{background:#ede9fe;color:#5b21b6}
.av-general{background:#dbeafe;color:#1e40af}
.av-exclude{background:#f3f4f6;color:#6b7280}
.card-name{font-size:14px;font-weight:600;color:#1a1a2e;line-height:1.3;margin-bottom:3px}
.card-sub{font-size:12px;color:#6b7280}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500}
.b-spine-trauma{background:#ede9fe;color:#5b21b6}
.b-spine{background:#d1fae5;color:#065f46}
.b-trauma{background:#fee2e2;color:#991b1b}
.b-general{background:#dbeafe;color:#1e40af}
.b-exclude{background:#f3f4f6;color:#6b7280}
.b-zone{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.b-high{background:#d1fae5;color:#065f46}
.b-medium{background:#fef3c7;color:#92400e}
.b-low{background:#fee2e2;color:#991b1b}
.card-hosp{font-size:11px;color:#9ca3af;margin-top:4px;line-height:1.4}
.card-contact{font-size:12px;color:#4b5563;margin-top:6px}

/* Profile page */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#6b7280;font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:16px;background:none;border:none}
.back-btn:hover{color:#1a1a2e}
.profile-wrap{display:grid;grid-template-columns:1fr 320px;gap:16px}
.profile-main{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:24px}
.profile-side{display:flex;flex-direction:column;gap:12px}
.side-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.profile-top{display:flex;gap:16px;align-items:flex-start;padding-bottom:18px;border-bottom:1px solid #f3f4f6;margin-bottom:18px}
.profile-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;flex-shrink:0}
.profile-name{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.profile-role{font-size:13px;color:#6b7280;margin-bottom:8px}
.section-title{font-size:11px;font-weight:600;color:#9ca3af;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;margin-top:18px}
.detail-table{width:100%;border-collapse:collapse}
.detail-table tr{border-bottom:1px solid #f3f4f6}
.detail-table tr:last-child{border-bottom:none}
.detail-table td{padding:8px 0;font-size:13px;vertical-align:top}
.detail-table td:first-child{color:#9ca3af;width:150px;min-width:150px;padding-right:16px}
.detail-table td:last-child{color:#1a1a2e;word-break:break-word}
.hosp-entry{background:#f9fafb;border-radius:7px;padding:10px 12px;margin-bottom:8px}
.hosp-name{font-size:13px;font-weight:600;color:#1a1a2e}
.hosp-addr{font-size:12px;color:#6b7280;margin-top:2px}
.notes-box{background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:12px;font-size:13px;color:#78350f;line-height:1.6}
.zone-empty{background:#f0f9ff;border:1px dashed #7dd3fc;border-radius:7px;padding:12px;font-size:13px;color:#0369a1;text-align:center}

/* Confidence dot */
.conf-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.conf-high{background:#10b981}
.conf-medium{background:#f59e0b}
.conf-low{background:#ef4444}

/* Stats bar */
.stats-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-pill{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 16px;font-size:12px;text-align:center;min-width:100px}
.stat-num{font-size:20px;font-weight:700;color:#1a1a2e;display:block;margin-bottom:1px}
.stat-lbl{color:#9ca3af}

/* Responsive */
@media(max-width:768px){
  .profile-wrap{grid-template-columns:1fr}
  .profile-side{display:contents}
  .grid{grid-template-columns:1fr}
  .header-stats{display:none}
}
</style>
</head>

<div class="header">
  <div class="header-inner">
    <div class="logo">Abone <span>Surgicals</span></div>
    <div class="header-stats">Bangalore Orthopaedic Doctors Master List &nbsp;·&nbsp; 817 Doctors &nbsp;·&nbsp; 5 Specializations</div>
    <div style="margin-left:auto;font-size:12px;color:#9ca3af">Abone Surgicals Pvt Ltd</div>

</div>

<div class="container">

<div class="page active" id="page-dir">

<!-- PROFILE PAGE -->
<div class="page" id="page-profile">
  <button class="back-btn" onclick="showDir()">&#8592; Back to directory</button>
  <div id="profile-content"></div>
</div>

</div>

  const el = document.getElementById('stats-bar');
  el.innerHTML = `<div class="stat-pill"><span class="stat-num">${DOCTORS.length}</span><span class="stat-lbl">Total</span></div>` +
    order.map(s=>`<div class="stat-pill"><span class="stat-num">${counts[s]||0}</span><span class="stat-lbl">${s}</span></div>`).join('');
}

function renderChips(){
  const specs = ['Spine & Trauma','Spine Surgery','Trauma Surgery','General Orthopaedic','Exclude'];
  document.getElementById('spec-chips').innerHTML =
    `<button class="chip ${activeSpec===''?'on':''}" onclick="setSpec('')">All</button>` +
    specs.map(s=>`<button class="chip ${activeSpec===s?'on':''}" onclick="setSpec('${s}')">${s}</button>`).join('');
}

function setSpec(s){ activeSpec=s; renderChips(); applyFilters(); }

function applyFilters(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const conf = document.getElementById('conf-filter').value;
  filteredDocs = DOCTORS.filter(d=>{
    if(activeSpec && d.specialization !== activeSpec) return false;
    if(conf && d.ai_confidence !== conf) return false;
    if(!q) return true;
    return [d.name,d.hospitals,d.clinic_name,d.phone,d.email,d.specialization,d.koa_no,d.full_address]
      .some(v=>v&&v.toLowerCase().includes(q));
  });
  renderGrid();
}

function renderGrid(){
  const meta = document.getElementById('results-meta');
  meta.textContent = `Showing ${filteredDocs.length} of ${DOCTORS.length} doctors`;
  const grid = document.getElementById('grid');
  if(!filteredDocs.length){
    grid.innerHTML = '<p style="color:#9ca3af;font-size:14px;padding:20px 0">No doctors match your search.</p>';
    return;
  }
  grid.innerHTML = filteredDocs.map(d=>{
    const bc = specClass(d.specialization,0);
    const ac = specClass(d.specialization,1);
    const confBadge = d.ai_confidence ? `<span class="badge b-${d.ai_confidence}"><span class="conf-dot conf-${d.ai_confidence}"></span>${d.ai_confidence}</span>` : '';
    const zoneBadge = d.zone ? `<span class="badge b-zone">Zone ${d.zone}${d.area?' · '+d.area:''}</span>` : '';
    const hosps = d.hospitals.replace(/★/g,'').split('|').map(h=>h.trim()).filter(Boolean).slice(0,2).join(' · ');
    return `<div class="card" onclick="showProfile(${d.id})">
      <div class="card-head">
        <div class="avatar ${ac}">${ini(d.name)}</div>
        <div><div class="card-name">${d.name}</div><div class="card-sub">${d.koa_no} &nbsp;·&nbsp; ${d.role||'Doctor'}</div></div>
      </div>
      <div class="badges">
        <span class="badge ${bc}">${d.specialization}</span>
        ${confBadge}${zoneBadge}
      </div>
      ${d.phone?`<div class="card-contact">📞 ${d.phone}</div>`:''}
      ${hosps?`<div class="card-hosp">${hosps}</div>`:''}
    </div>`;
  }).join('');
}

function showProfile(id){
  const d = DOCTORS.find(x=>x.id===id);
  if(!d) return;
  const ac = specClass(d.specialization,1);
  const bc = specClass(d.specialization,0);
  const hosps = d.hospitals.replace(/★/g,'').split('|').map(h=>h.trim()).filter(Boolean);
  const hospAddrs = d.hospital_address ? d.hospital_address.split('|').map(h=>h.trim()).filter(Boolean) : [];
  const hospHTML = hosps.map((h,i)=>`
    <div class="hosp-entry">
      <div class="hosp-name">${h}</div>
      ${hospAddrs[i]?`<div class="hosp-addr">${hospAddrs[i]}</div>`:''}
      ${d.hospital_maps_link&&i===0?`<a href="${d.hospital_maps_link}" target="_blank" style="font-size:12px;color:#1a56db;display:inline-block;margin-top:4px">View on Google Maps ↗</a>`:''}
    </div>`).join('');

  const rows = (label,val,isLink)=>{
    if(!val) return '';
    const v = isLink ? `<a href="${val}" target="_blank">${val}</a>` : val;
    return `<tr><td>${label}</td><td>${v}</td></tr>`;
  };

  const zoneBlock = (d.zone||d.area)
    ? `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;padding:12px;font-size:13px;color:#166534">
        <strong>Zone ${d.zone}</strong>${d.area?' &nbsp;·&nbsp; '+d.area:''}
       </div>`
    : `<div class="zone-empty">Zone &amp; Area not yet assigned<br><small style="color:#0369a1;opacity:.7">Will be filled once mapping is received</small></div>`;

  document.getElementById('profile-content').innerHTML = `
    <div class="profile-wrap">
      <div class="profile-main">
        <div class="profile-top">
          <div class="profile-avatar ${ac}">${ini(d.name)}</div>
          <div>
            <div class="profile-name">Dr. ${d.name}</div>
            <div class="profile-role">${d.role||'Doctor'} &nbsp;·&nbsp; ${d.specialization}</div>
            <div class="badges" style="margin-top:6px">
              <span class="badge ${bc}">${d.specialization}</span>
              ${d.ai_confidence?`<span class="badge b-${d.ai_confidence}"><span class="conf-dot conf-${d.ai_confidence}"></span>${d.ai_confidence} data</span>`:''}
              <span class="badge" style="background:#f3f4f6;color:#374151">${d.koa_no}</span>
            </div>
          </div>
        </div>

        <div class="section-title">Contact Details</div>
        <table class="detail-table">
          ${rows('Phone',d.phone)}
          ${rows('Email',d.email)}
          ${rows('Source / Profile',d.source,true)}
        </table>

        <div class="section-title">Consultation</div>
        <table class="detail-table">
          ${rows('Days',d.consultation_days)}
          ${rows('Timing',d.consultation_timing)}
          ${rows('Approx. Surgeries',d.approx_surgeries)}
          ${rows('% Using Abone',d.pct_abone)}
        </table>

        <div class="section-title">Hospitals & Practice</div>
        ${hospHTML||'<p style="font-size:13px;color:#9ca3af">No hospital data</p>'}

        <div class="section-title">Clinic</div>
        <table class="detail-table">
          ${rows('Clinic Name',d.clinic_name)}
          ${rows('Clinic Location',d.clinic_location)}
        </table>

        <div class="section-title">Hospital Details</div>
        <table class="detail-table">
          ${rows('Rating',d.hospital_rating ? d.hospital_rating + ' ★ (' + d.hospital_reviews + ' reviews)' : '')}
          ${rows('Category',d.hospital_category)}
          ${rows('Hospital Website',d.hospital_website,true)}
          ${rows('Full Address',d.full_address)}
        </table>

        ${d.notes?`<div class="section-title">Notes</div><div class="notes-box">${d.notes}</div>`:''}
      </div>

      <div class="profile-side">
        <div class="side-card">
          <div class="section-title" style="margin-top:0">Zone & Area</div>
          ${zoneBlock}
        </div>

        ${d.hospital_maps_link?`<div class="side-card">
          <div class="section-title" style="margin-top:0">Location</div>
          <a href="${d.hospital_maps_link}" target="_blank" style="display:block;background:#f0f9ff;border:1px solid #bae6fd;border-radius:7px;padding:12px;font-size:13px;color:#0369a1;text-align:center">
            Open in Google Maps ↗
          </a>
        </div>`:''}

        <div class="side-card">
          <div class="section-title" style="margin-top:0">Quick Info</div>
          <table class="detail-table">
            ${rows('KOA No.',d.koa_no)}
            ${rows('Role',d.role)}
            ${rows('Specialization',d.specialization)}
            ${rows('Data Confidence',d.ai_confidence)}
          </table>
        </div>
      </div>
    </div>`;

  document.getElementById('page-dir').classList.remove('active');
  document.getElementById('page-profile').classList.add('active');
  window.scrollTo(0,0);
}

function showDir(){
  document.getElementById('page-profile').classList.remove('active');
  document.getElementById('page-dir').classList.add('active');
  window.scrollTo(0,0);
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('conf-filter').addEventListener('change', applyFilters);

renderStats();
renderChips();
applyFilters();
</script>
</body>
</html>
